# H2 file-based database — data survives restarts, lives in ./data/todos.mv.db
spring.datasource.url=jdbc:h2:file:./data/todos
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Auto-create / update schema from JPA entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 web console — useful for inspecting DB state during development
# Access at http://localhost:8080/h2-console  JDBC URL: jdbc:h2:file:./data/todos
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080
vaadin.urlMapping=/vaadin/*

# Vaadin — disable the launch-browser behaviour in dev mode
vaadin.launch-browser=false

# Vaadin scans these packages for routes, web component exporters, etc.
vaadin.allowed-packages=com.vaadin,org.vaadin,dev.hilla,com.example
